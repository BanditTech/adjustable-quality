epic_next_probability=Determines the effectiveness of quality modules when upgrading from epic. 1 is the default value, which multiplies against the machine quality percentage.
legendary_next_probability=Determines the effectiveness of quality modules when upgrading from legendary. 1 is the default value, which multiplies against the machine quality percentage.
