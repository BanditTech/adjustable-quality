transcendent_level_step=Increment added to the base Transcendent level for each numeric suffix N (for example, base 20 with step 1 and N=2 yields level 22).
transcendent_science_pack_drain_step=Percentage points subtracted from the base Transcendent science pack drain for each additional level; final drain is clamped between 1 and 100.
transcendent_next_probability_decay=Multiplicative decay factor applied to the base Transcendent next probability for each additional level (for example, decay=0.9 gives base * 0.9^N).

