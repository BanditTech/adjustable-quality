quality_affects_capacity_fluid_wagon=If enabled, quality will affect the capacity of Fluid Wagons.
fluid_wagon_capacity_multiplier=Scales the capacity of fluid wagons based on the default multiplier.
cargo_wagon_inventory_size_multiplier=Scales the inventory slots of cargo wagons based on the default multiplier. If the default multiplier and this option remain default, quality levels below 5 (legendary) are given .25 instead of .3 to emulate the default configuration from the game files.
quality_affects_max_speed=If enabled, quality will affect the max speed of locomotives.
rolling_stock_max_speed_multiplier=Scales the maximum speed of locomotives based on the quality level.
locomotive_power_multiplier=Scales the acceleration power and fuel consumption of locomotives based on the quality level.

fork_chance_increase_per_quality_level_chain_active_trigger=Adjusts the fork chance increase per quality level for Tesla weapons.
asteroid_collector_collection_radius_bonus=Scales the overal area of the collector based on the quality level. Keep in mind this increases calculation time for arm pathing.
arm_inventory_size_quality_increase_collector=Adjusts the arm inventory size increase based on quality level for Asteroid Collectors.
inventory_size_quality_increase_collector=Adjusts the inventory size increase based on quality level for Asteroid Collectors.
energy_usage_quality_scaling_collector=Scales the energy usage of Asteroid Collectors based on quality level. Range: 0 to 10 (values >0.1 increase energy usage from default).
arm_count_quality_scaling_collector=Scales the arm count of Asteroid Collectors based on quality level.
arm_speed_quality_scaling_collector=Scales the arm speed of Asteroid Collectors based on quality level.
arm_angular_speed_cap_quality_scaling_collector=Scales the arm angular speed cap of Asteroid Collectors based on quality level.

module_consumption_multiplier=Scales the positive consumption effect provided by modules. This is multiplied against the default multiplier.
module_speed_multiplier=Scales the positive speed effect provided by modules. This is multiplied against the default multiplier.
module_productivity_multiplier=Scales the positive productivity effect provided by modules. This is multiplied against the default multiplier.
module_pollution_multiplier=Scales the positive pollution effect provided by modules. This is multiplied against the default multiplier. This setting is unique, because there are no vanilla modules with a positive pollution effect that is scaled by quality.
module_quality_multiplier=Scales the positive quality effect provided by modules. This is multiplied against the default multiplier.

agricultural_tower_enable_modules=If enabled, Agricultural towers will be given module slots and the ability to receive module effects.
agricultural_tower_module_slots=Determines the base number of module slots the machine will be provided with at normal quality.
agricultural_tower_quality_affects_module_slots=Scales the module slots with quality, uses the value from mining drill module slot bonus to determine the number of added slots.

rocket_rising_speed_modifier_per_quality_level=Determines the speed at which the rocket ascends from a planet.
rocket_engine_starting_speed_modifier_per_quality_level=Determines the speed at which the rocket starts its engines.
arms_speed_modifier_per_quality_level=Determines the speed at which the rocket handles the attaching arms.

spoil_ticks_multiplier=Scales the spoilage timer based on default multiplier.