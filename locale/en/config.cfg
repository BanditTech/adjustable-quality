masterwork_next_probability=Determines the effectiveness of quality modules when upgrading from masterwork. 1 is the default value, which multiplies against the machine quality percentage.
wondrous_next_probability=Determines the effectiveness of quality modules when upgrading from wondrous. 1 is the default value, which multiplies against the machine quality percentage.
eternal_next_probability=Determines the effectiveness of quality modules when upgrading from eternal. 1 is the default value, which multiplies against the machine quality percentage.
transcendent_next_probability=Determines the effectiveness of quality modules when upgrading from transcendent. 1 is the default value, which multiplies against the machine quality percentage.

